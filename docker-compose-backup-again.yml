services:
  pg:
    image: postgres:16
#    container_name: dcapx-pg
    environment:
      POSTGRES_USER: dcapx
      POSTGRES_PASSWORD: dcapx
      POSTGRES_DB: dcapx
    volumes:
      - dcapx_pg:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U dcapx -d dcapx"]
      interval: 5s
      timeout: 5s
      retries: 20
    # OPTIONAL (dev only): comment in if you want host access
    ports:
      - "127.0.0.1:5445:5432"

  redis:
    image: redis:7
#    container_name: dcapx-redis
    volumes:
      - dcapx_redis:/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL","redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    # OPTIONAL (dev only):
    # ports:
    #   - "127.0.0.1:6380:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
#    container_name: dcapx-api
    environment:
      API_PORT: "4010"
      DATABASE_URL: "postgresql://dcapx:dcapx@pg:5432/dcapx?schema=public"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
      - data
    ports:
      - "127.0.0.1:4010:4010"
    working_dir: /app/apps/api
    command: ["sh", "-lc", "pnpm prisma generate && pnpm prisma migrate deploy && node dist/server.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
#    container_name: dcapx-web
    environment:
      NODE_ENV: "production"
      HOSTNAME: "0.0.0.0"
      API_INTERNAL_URL: "http://api:4010"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
      - app
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  dcapx_pg:
  dcapx_redis:

networks:
  public: {}
  app: {}
  data:
    internal: true
