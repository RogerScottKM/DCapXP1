services:
  pg:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dcapx_pg:/var/lib/postgresql/data
    networks:
      - data
      - devhost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:5445:5432"

  redis:
    image: redis:7
    volumes:
      - dcapx_redis:/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: "4010"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ADMIN_KEY: ${ADMIN_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      OTP_HMAC_SECRET: ${OTP_HMAC_SECRET:-}
        MFA_TOTP_ISSUER: ${MFA_TOTP_ISSUER:-DCapX}
        MFA_TOTP_ENCRYPTION_KEY: ${MFA_TOTP_ENCRYPTION_KEY:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-DCapX <no-reply@dcapitalx.local>}
      VAULT_ENABLED: ${VAULT_ENABLED:-false}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_MOUNT_PATH: ${VAULT_MOUNT_PATH:-approle}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
      VAULT_SECRET_ID_FILE: ${VAULT_SECRET_ID_FILE:-}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-secret/data/dcapx/api}
      VAULT_OVERRIDE_ENV: ${VAULT_OVERRIDE_ENV:-false}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
      - data
    ports:
      - "127.0.0.1:4010:4010"
    working_dir: /app/apps/api
    command: ["sh", "-lc", "pnpm prisma migrate deploy && pnpm start"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    stop_grace_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOSTNAME: "0.0.0.0"
      API_INTERNAL_URL: "http://api:4010"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
      - app
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  dcapx_pg:
  dcapx_redis:

networks:
  public: {}
  app: {}
  data:
    internal: true
  devhost: {}
