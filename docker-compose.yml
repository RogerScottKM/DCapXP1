services:
  pg:
    image: postgres:16
    environment:
      POSTGRES_USER: dcapx
      POSTGRES_PASSWORD: dcapx
      POSTGRES_DB: dcapx
    volumes:
      - dcapx_pg:/var/lib/postgresql/data
    networks:
      - data
      - devhost
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U dcapx -d dcapx"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:5445:5432"

  redis:
    image: redis:7
    volumes:
      - dcapx_redis:/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL","redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: "4010"
      DATABASE_URL: "postgresql://dcapx:dcapx@pg:5432/dcapx?schema=public"
      REDIS_URL: "redis://redis:6379"
      ADMIN_KEY: "change-me-now-please"
      ENABLE_BOT_FARM: "1"
      JWT_SECRET: "d7c601259407f2ff0e26a5ebaf16eae0129183372c29e286cfced428d4adf0c7"
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
      - data
    ports:
      - "127.0.0.1:4010:4010"
    working_dir: /app/apps/api
    command: ["sh", "-lc", "pnpm prisma generate && pnpm prisma migrate deploy && node dist/server.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: "production"
      HOSTNAME: "0.0.0.0"
      API_INTERNAL_URL: "http://api:4010"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
      - app
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  dcapx_pg:
  dcapx_redis:

networks:
  public: {}
  app: {}
  data:
    internal: true
  devhost: {}
